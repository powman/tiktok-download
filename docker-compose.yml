version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - API_HOST=0.0.0.0
      - API_PORT=5001
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:5001}
      - GOOGLE_SHEETS_ID=${GOOGLE_SHEETS_ID}
      - GOOGLE_SHEETS_CREDENTIALS_PATH=/app/credentials/google-sheets.json
    volumes:
      - ./downloads:/downloads
      - ./backend/credentials:/app/credentials:ro
    container_name: tiktok-backend
    networks:
      - tiktok-network

  frontend:
    build: ./frontend
    ports:
      - "8082:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5001}
    depends_on:
      - backend
    container_name: tiktok-frontend
    networks:
      - tiktok-network

networks:
  tiktok-network:
    driver: bridge
